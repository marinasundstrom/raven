name: Raven website

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - ".config/dotnet-tools.json"
      - "docs/**"
      - "build/**"
      - "scripts/build-docs.sh"
      - "scripts/build-playground-site.sh"
      - "scripts/codex-build.sh"
      - "src/Raven.CodeAnalysis/**"
      - "src/Raven.Compiler/**"
      - "src/Raven.Core/**"
      - "src/Raven.Playground/**"
      - "tools/**Generator/**"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - ".config/dotnet-tools.json"
      - "docs/**"
      - "build/**"
      - "scripts/build-docs.sh"
      - "scripts/build-playground-site.sh"
      - "scripts/codex-build.sh"
      - "src/Raven.CodeAnalysis/**"
      - "src/Raven.Compiler/**"
      - "src/Raven.Core/**"
      - "src/Raven.Playground/**"
      - "tools/**Generator/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            11.0.x
          dotnet-quality: preview

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Raven.Playground/package-lock.json

      - name: Build documentation
        run: scripts/build-docs.sh

      - name: Add playground
        run: scripts/build-playground-site.sh

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
